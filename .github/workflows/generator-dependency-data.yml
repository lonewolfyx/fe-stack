name: Generator Dependency Star Download Data

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: "30 */12 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Set node
        uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm

      - name: Build
        run: npm install

      - name: run
        run: REQUEST_TOKEN=${{secrets.REQUEST_TOKEN}} npm run gen:data

      - name: "Commit"
        uses: EndBug/add-and-commit@v10
        with:
          author_name: lonewolfyx
          author_email: olddrivero.king@qq.com
          message: "fix(data): Update the latest number of stars and downloads in dependency.json"
          add: "."

        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}